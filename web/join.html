<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Group – GroupThat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F9FAFB;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 700; color: #111827; margin-bottom: 8px; }
    p { font-size: 16px; color: #6B7280; line-height: 1.5; margin-bottom: 28px; }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      margin-bottom: 12px;
      cursor: pointer;
      border: none;
    }
    .btn-primary { background: #4A90E2; color: white; }
    .btn-secondary { background: #F3F4F6; color: #374151; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #E5E7EB;
      border-top-color: #4A90E2;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status { font-size: 14px; color: #9CA3AF; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">👥</div>
    <h1>You're Invited!</h1>
    <p id="message">Opening GroupThat…</p>
    <div class="spinner" id="spinner"></div>
    <p id="status"></p>
    <a id="ios-btn" class="btn btn-primary" style="display:none"
       href="https://apps.apple.com/app/idYOUR_APP_STORE_ID">
      Download on the App Store
    </a>
    <a id="android-btn" class="btn btn-primary" style="display:none"
       href="https://play.google.com/store/apps/details?id=com.dallinhull.groupthat">
      Get it on Google Play
    </a>
    <p id="already-msg" style="display:none; margin-top:0;">
      Already have the app?
    </p>
    <button id="open-btn" class="btn btn-secondary" style="display:none"
            onclick="tryOpenApp()">
      Open GroupThat
    </button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const appSchemeUrl = token ? 'groupthat://join/' + token : null;

    const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
    const isAndroid = /Android/.test(navigator.userAgent);

    function showStoreButtons() {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('message').textContent =
        'Download GroupThat to join this group — your invite will be waiting after setup.';
      if (isIOS) document.getElementById('ios-btn').style.display = 'block';
      else if (isAndroid) document.getElementById('android-btn').style.display = 'block';
      else {
        document.getElementById('message').textContent =
          'Open this link on your iOS or Android device to join the group.';
      }
      document.getElementById('already-msg').style.display = 'block';
      document.getElementById('open-btn').style.display = 'block';
    }

    function tryOpenApp() {
      if (appSchemeUrl) window.location.href = appSchemeUrl;
    }

    if (!token) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('message').textContent = 'This invite link is invalid.';
    } else {
      // Write the scheme URL to clipboard so the app can detect it on first launch
      if (navigator.clipboard) {
        navigator.clipboard.writeText(appSchemeUrl).catch(() => {});
      }

      // Try to open the app directly
      tryOpenApp();

      // If the app didn't open within 1.5 seconds, show the store buttons
      setTimeout(showStoreButtons, 1500);
    }
  </script>
</body>
</html>
